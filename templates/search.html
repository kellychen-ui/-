<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>教師查詢</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 40px; }
        .result-item { margin-bottom: 20px; color: blue; font-weight: bold; }
        hr { margin: 20px 0; border: 0; border-top: 1px solid #ccc; }
        a { text-decoration: none; color: blue; }
    </style>
</head>
<body>

    <h2>靜宜資管老師查詢</h2>

    <form method="POST" action="/search">
        請輸入老師姓名關鍵字：
        <input type="text" name="keyword" value="{{ keyword }}">
        <button type="submit">查詢</button>
    </form>

    <hr>

    {% if keyword %}
        <h3>查詢結果 (關鍵字: {{ keyword }}):</h3>
        
        {% if results %}
            {% for t in results %}
                <div class="result-item">
                    {{ t.name }} <span style="color: black; font-weight: normal;">老師的研究室是在</span> {{ t.lab }}
                </div>
            {% endfor %}
        {% else %}
            <p>找不到相符的老師。</p>
        {% endif %}
    {% endif %}

    <br>
    <a href="/search">返回首頁</a>

</body>
</html>
